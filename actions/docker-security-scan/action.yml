name: "Docker Security Scan"
description: "Scans Docker images for vulnerabilities using Trivy and uploads SARIF reports to GitHub Security tab"

branding:
  icon: "shield"
  color: "blue"

inputs:
  image-ref:
    description: "Docker image reference to scan (e.g., ghcr.io/owner/repo/image:tag)"
    required: true
  report-name:
    description: "Name for the security report file (without extension)"
    required: true
  category:
    description: "SARIF category for GitHub Security tab (e.g., backend-trivy, frontend-trivy)"
    required: true
  severity:
    description: "Comma-separated list of severities to scan for"
    required: false
    default: "HIGH,CRITICAL"
  fail-on-error:
    description: "Whether to fail the pipeline if vulnerabilities are found"
    required: false
    default: "true"

outputs:
  scan-result:
    description: "Result of the security scan (success, failed, error)"
    value: ${{ steps.scan-status.outputs.result }}
  sarif-file:
    description: "Path to the generated SARIF file"
    value: ${{ steps.scan-status.outputs.sarif-file }}

runs:
  using: "composite"
  steps:
    - name: Run Trivy vulnerability scanner
      id: trivy-scan
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
      continue-on-error: true
      with:
        image-ref: ${{ inputs.image-ref }}
        format: "template"
        template: "@/contrib/sarif.tpl"
        output: "${{ inputs.report-name }}.sarif"
        severity: ${{ inputs.severity }}

    - name: Evaluate scan results
      id: scan-status
      shell: bash
      env:
        IMAGE_REF: ${{ inputs.image-ref }}
        SEVERITY: ${{ inputs.severity }}
        REPORT_NAME: ${{ inputs.report-name }}
        TRIVY_OUTCOME: ${{ steps.trivy-scan.outcome }}
      run: |
        echo "🔍 Security scan for: $IMAGE_REF"
        echo "   Severity levels: $SEVERITY"

        if [ -f "${REPORT_NAME}.sarif" ] && [ -s "${REPORT_NAME}.sarif" ]; then
          VULN_COUNT=$(jq '[.runs[].results[] | select(.level=="error")] | length' "${REPORT_NAME}.sarif" 2>/dev/null || echo "0")
          HIGH_COUNT=$(jq '[.runs[].results[].message.text | select(contains("HIGH"))] | length' "${REPORT_NAME}.sarif" 2>/dev/null || echo "0")
          CRITICAL_COUNT=$(jq '[.runs[].results[].message.text | select(contains("CRITICAL"))] | length' "${REPORT_NAME}.sarif" 2>/dev/null || echo "0")

          echo "   Vulnerabilities — Total: $VULN_COUNT | HIGH: $HIGH_COUNT | CRITICAL: $CRITICAL_COUNT"

          if [ "$TRIVY_OUTCOME" = "success" ]; then
            echo "result=success" >> $GITHUB_OUTPUT
            echo "sarif-file=${REPORT_NAME}.sarif" >> $GITHUB_OUTPUT
            if [ "$VULN_COUNT" -eq 0 ]; then
              echo "🎉 No vulnerabilities found matching severity: $SEVERITY"
            else
              echo "✅ Scan completed — vulnerabilities below threshold"
            fi
          elif [ "$TRIVY_OUTCOME" = "failure" ]; then
            echo "result=failed" >> $GITHUB_OUTPUT
            echo "sarif-file=${REPORT_NAME}.sarif" >> $GITHUB_OUTPUT
            echo "⚠️ Vulnerabilities found ($HIGH_COUNT HIGH, $CRITICAL_COUNT CRITICAL)"
          else
            echo "result=error" >> $GITHUB_OUTPUT
            echo "sarif-file=${REPORT_NAME}.sarif" >> $GITHUB_OUTPUT
            echo "❌ Scan encountered an error but produced partial output"
          fi
        else
          echo "result=error" >> $GITHUB_OUTPUT
          echo "sarif-file=" >> $GITHUB_OUTPUT
          echo "❌ No SARIF file produced — check image reference and registry access"
        fi

    - name: Upload SARIF to GitHub Security tab
      if: always() && steps.scan-status.outputs.sarif-file != ''
      # If upgrading to newer versions that pull in upload-artifact v6, ensure self-hosted runners are >= 2.327.1 and Node.js 24 is available.
      uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
      continue-on-error: true
      with:
        sarif_file: ${{ steps.scan-status.outputs.sarif-file }}
        category: ${{ inputs.category }}

    - name: Upload scan results as artifact
      if: always() && steps.scan-status.outputs.sarif-file != ''
      # If upgrading to v6, ensure self-hosted runners are >= 2.327.1 and Node.js 24 is available.
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      continue-on-error: true
      with:
        name: ${{ inputs.report-name }}-scan-results
        path: ${{ steps.scan-status.outputs.sarif-file }}
        retention-days: 30

    - name: Fail pipeline if required
      if: inputs.fail-on-error == 'true' && steps.scan-status.outputs.result != 'success'
      shell: bash
      run: |
        echo "❌ Security scan failed and fail-on-error is enabled"
        echo "   Result: ${{ steps.scan-status.outputs.result }}"
        echo "   Review the SARIF report in GitHub Security tab for details"
        exit 1
