# Reusable workflow: Synchronize GitHub labels from a YAML config file
# Requires a .github/labels.yml in the CALLER repo.
# Usage:
#   jobs:
#     sync:
#       uses: dallay/common-actions/.github/workflows/labels-sync.yml@v1
#       secrets: inherit
name: Sync Labels

on:
  workflow_call:
    inputs:
      labels-file:
        description: "Path to labels YAML file in the caller repo"
        type: string
        required: false
        default: ".github/labels.yml"
    secrets:
      github-token:
        description: "GitHub token for syncing labels (defaults to GITHUB_TOKEN)"
        required: false

permissions:
  contents: read
  issues: write

jobs:
  sync:
    name: Synchronize Labels
    runs-on: ubuntu-latest
    if: ${{ !github.event.repository.fork }}
    concurrency:
      group: labels-${{ github.repository }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: crazy-max/ghaction-github-labeler@548a7c3603594ec17c819e1239f281a3b801ab4d # v6
        with:
          github-token: ${{ secrets.github-token || github.token }}
          yaml-file: ${{ inputs.labels-file }}
