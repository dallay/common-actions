name: PR Size Labeler

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  workflow_call:
    secrets:
      GITHUB_TOKEN:
        description: "GitHub token for labeling PRs (defaults to GITHUB_TOKEN)"
        required: false

jobs:
  label:
    permissions:
      pull-requests: write
      contents: read
      issues: write
    runs-on: ubuntu-latest
    name: Label the PR size
    steps:
      - uses: CodelyTV/pr-size-labeler@095a41fca88b8764fd9e008ad269bcdb82bb38b9 # v1.10.4
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_label: 'size/xs'
          xs_max_size: '10'
          s_label: 'size/s'
          s_max_size: '100'
          m_label: 'size/m'
          m_max_size: '500'
          l_label: 'size/l'
          l_max_size: '1000'
          xl_label: 'size/xl'