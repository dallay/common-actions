# Reusable workflow: Label PRs based on the number of lines changed
# Usage:
#   jobs:
#     size-label:
#       uses: dallay/common-actions/.github/workflows/pr-size-labeler.yml@v1
#       secrets: inherit
name: PR Size Labeler

on:
  workflow_call:
    secrets:
      github-token:
        description: "GitHub token for labeling PRs (defaults to GITHUB_TOKEN)"
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  contents: read
  issues: write

jobs:
  label:
    runs-on: ubuntu-latest
    name: Label the PR size
    steps:
      - uses: CodelyTV/pr-size-labeler@095a41fca88b8764fd9e008ad269bcdb82bb38b9 # v1.10.4
        with:
          GITHUB_TOKEN: ${{ secrets.github-token || github.token }}
          xs_label: 'size/xs'
          xs_max_size: '10'
          s_label: 'size/s'
          s_max_size: '100'
          m_label: 'size/m'
          m_max_size: '500'
          l_label: 'size/l'
          l_max_size: '1000'
          xl_label: 'size/xl'
          xl_fail: 'false'
